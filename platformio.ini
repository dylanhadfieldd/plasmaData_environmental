[platformio]
description = ESP32 sensor-only dashboard (temp, humidity, distance)

[env:esp32dev]
platform = espressif32 @ ^6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  adafruit/Adafruit SHTC3 Library @ ^1.0.1
  adafruit/Adafruit_VL6180X @ ^1.4.4
build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9488_DRIVER
  -D TFT_WIDTH=480
  -D TFT_HEIGHT=320
  -D TFT_MISO=19
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=14
  -D TFT_DC=26
  -D TFT_RST=4
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=16000000
  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
  -D LOAD_GFXFF

upload_port = COM3
monitor_port = COM3